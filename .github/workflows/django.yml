name: Django CI

# The robot starts automatically when you "push" code to the main branch
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Copy code to the test server
      uses: actions/checkout@v3

    - name: Install Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install required packages
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Check if the project has errors
      run: |
        python manage.py check